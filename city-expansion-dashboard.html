*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh}

.top-bar{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:white;padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
.top-bar h1{font-size:22px;font-weight:700}
.top-bar .meta{font-size:13px;opacity:.7}

.container{max-width:1600px;margin:0 auto;padding:20px}

/* 大盘指标 */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:white;border-radius:10px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi .lab{font-size:12px;color:#888;margin-bottom:6px}
.kpi .val{font-size:26px;font-weight:700;color:#1a1a2e}
.kpi .sub{font-size:12px;margin-top:4px;color:#888}
.kpi.hl{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.kpi.hl .lab,.kpi.hl .sub{color:rgba(255,255,255,.8)}
.kpi.hl .val{color:white}
.kpi.warn{border-left:4px solid #ef4444}

/* 图例 */
.legend-bar{display:flex;gap:24px;margin-bottom:14px;font-size:12px;color:#555;align-items:center;flex-wrap:wrap}
.legend-bar .dot{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:4px}

/* 表格 */
.table-wrap{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow-x:auto;margin-bottom:24px}
table.main{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f8f9fb;padding:10px 5px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e0e0e0;white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:first-child,tbody td:first-child{padding-left:12px}
thead th.center{text-align:center}
thead th.gap,tbody td.gap{width:40px;padding:0}
tbody td{padding:10px 5px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tbody tr:hover{background:#f8faff}
tbody tr.group-first td{border-top:2px solid #d0d0d0}
td.center{text-align:center}

/* 省区名+优先级 */
.prov{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.prov:hover .prov-name{color:#667eea;text-decoration:underline}
.prov-name{font-weight:700;font-size:14px;color:#1a1a2e;text-decoration:underline;text-decoration-color:#ccc;text-underline-offset:3px}
.pri{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:700;color:white;line-height:18px}
.pri.t0{background:#dc2626}
.pri.t1{background:#f97316}
.pri.t2{background:#94a3b8}

/* 标注 */
.below{display:inline-block;background:#fef2f2;color:#dc2626;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;margin-left:4px}
.row-warn{background:#fef9f9 !important}

/* 进度条 */
.bar-wrap{width:110px;height:18px;background:#e5e7eb;border-radius:9px;overflow:hidden;display:inline-block;vertical-align:middle}
.bar-fill{height:100%;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;min-width:28px}
.bar-fill.ok{background:linear-gradient(90deg,#667eea,#764ba2)}
.bar-fill.bad{background:linear-gradient(90deg,#f97316,#ef4444)}

/* 同比 */
.yoy-up{color:#22c55e;font-weight:600}
.yoy-down{color:#ef4444;font-weight:600}

/* 弹窗 */
.mask{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center}
.mask.show{display:flex}
.dialog{background:white;width:92%;max-width:1100px;max-height:85vh;border-radius:14px;overflow-y:auto;padding:28px}
.dialog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #e0e0e0}
.dialog-head h2{font-size:20px;color:#1a1a2e}
.x-btn{font-size:26px;cursor:pointer;color:#666;background:none;border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.x-btn:hover{background:#f0f0f0}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin-bottom:20px}
.info-card{background:#f8f9fb;padding:14px;border-radius:10px}
.info-card .l{font-size:11px;color:#888;margin-bottom:4px}
.info-card .v{font-size:18px;font-weight:700;color:#1a1a2e}
.sp-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px}
.sp-tbl th{background:#f8f9fb;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #e0e0e0}
.sp-tbl td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
</style>
</head>

// 优先级
const PRI = {'河南':'T0','河北':'T1','广西':'T1','新疆':'T2','湖南':'T1','山东':'T1','安徽':'T1','湖北':'T2','四川':'T0','陕西':'T2','辽宁':'T2','福建':'T2','浙江':'T0','江苏':'T2'};
function pri(pv){
  if(pv.includes('冀豫'))return'T0';if(pv.includes('鄂赣'))return'T2';if(pv.includes('桂黔琼'))return'T1';
  if(pv.includes('陕晋蒙'))return'T2';if(pv.includes('西北'))return'T2';if(pv.includes('东北'))return'T2';
  for(const[k,v]of Object.entries(PRI))if(pv.includes(k))return v;return'T2';
}

// 重算进度
D.forEach(d=>{d.t=d.s/d.tAdv; d.v=d.u/d.tSpd;});

// 大盘均值
const avgT = D.reduce((a,d)=>a+d.t,0)/D.length;
const avgV = D.reduce((a,d)=>a+d.v,0)/D.length;

// KPI
function renderKPI(){
  let s26=0,u26=0,d25=0,c25=0,belowN=0;
  D.forEach(d=>{s26+=d.s;u26+=d.u;d25+=d.d;c25+=d.c;if(d.t<avgT||d.v<avgV)belowN++});
  const advYoY=((s26/d25)-1)*100;
  const spdYoY=((u26/c25)-1)*100;
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi hl"><div class="lab">26YTD 日耗合计</div><div class="val">${fmt(u26)}</div></div>
    <div class="kpi hl"><div class="lab">26YTD 广告主数合计</div><div class="val">${s26}</div></div>
    <div class="kpi"><div class="lab">广告主数整体进度</div><div class="val">${(avgT*100).toFixed(1)}%</div><div class="sub">全省区26YTD广告主数/26H1目标广告主数均值</div></div>
    <div class="kpi"><div class="lab">日耗整体进度</div><div class="val">${(avgV*100).toFixed(1)}%</div><div class="sub">全省区26YTD日耗/26H1目标日耗均值</div></div>
    <div class="kpi"><div class="lab">广告主数整体同比</div><div class="val">${advYoY>=0?'+':''}${advYoY.toFixed(1)}%</div><div class="sub">(26YTD广告主数合计/25YTD广告主数)-1</div></div>
    <div class="kpi"><div class="lab">日耗整体同比</div><div class="val">${spdYoY>=0?'+':''}${spdYoY.toFixed(1)}%</div><div class="sub">(26YTD日耗合计/25YTD日耗)-1</div></div>
  `;
}

// 主表格
function renderTable(){
  const priOrder={'T0':0,'T1':1,'T2':2};
  const sorted=[...D].sort((a,b)=>{
    const pa=priOrder[pri(a.pv)]??9, pb=priOrder[pri(b.pv)]??9;
    if(pa!==pb) return pa-pb;
    return b.u-a.u;
  });
  let html='',lastPri='';
  sorted.forEach(d=>{
    const p=pri(d.pv);
    const advYoY=(d.s/d.d-1)*100;
    const spdYoY=(d.u/d.c-1)*100;
    const advB=d.t<avgT, spdB=d.v<avgV;
    const isFirst=p!==lastPri; lastPri=p;

    html+=`<tr class="${isFirst?'group-first':''} ${(advB||spdB)?'row-warn':''}">
      <td>${d.rg}</td>
      <td>
        <span class="prov" onclick="openDlg('${d.pv}')">
          <span class="prov-name">${d.pv}</span>
          <span class="pri ${p.toLowerCase()}">${p}</span>
        </span>
      </td>
      <td><b>${d.s}</b> <span style="color:#999;font-size:11px">/ ${d.tAdv}</span>${advB?'<span class="below">↓低于大盘</span>':''}</td>
      <td class="center">${bar(d.t,advB)}</td>
      <td class="center"><span class="${advYoY>=0?'yoy-up':'yoy-down'}">${advYoY>=0?'+':''}${advYoY.toFixed(1)}%</span></td>
      <td class="gap"></td>
      <td><b>${fmt(d.u)}</b> <span style="color:#999;font-size:11px">/ ${fmt(d.tSpd)}</span>${spdB?'<span class="below">↓低于大盘</span>':''}</td>
      <td class="center">${bar(d.v,spdB)}</td>
      <td class="center"><span class="${spdYoY>=0?'yoy-up':'yoy-down'}">${spdYoY>=0?'+':''}${spdYoY.toFixed(1)}%</span></td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML=html;
}

function bar(val,bad){
  const pct=Math.min(val*100,100).toFixed(1);
  return`<div class="bar-wrap"><div class="bar-fill ${bad?'bad':'ok'}" style="width:${pct}%">${(val*100).toFixed(0)}%</div></div>`;
}
